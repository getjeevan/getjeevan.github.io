<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashle Gardens — Visual Gallery & Renderings</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #e0e7ff 100%);
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            color: #7c3aed;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 30px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .gallery-item {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(124, 58, 237, 0.15);
        }

        .gallery-item img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .gallery-item-info {
            padding: 20px;
        }

        .gallery-item-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #7c3aed;
            margin-bottom: 8px;
        }

        .gallery-item-desc {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .gallery-item-tag {
            display: inline-block;
            background: #f0fdf4;
            color: #10b981;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .view-full-btn {
            display: block;
            margin-top: 12px;
            padding: 10px 16px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .view-full-btn:hover {
            background: #6d28d9;
            transform: scale(1.02);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-content img {
            max-width: 100%;
            max-height: 85vh;
            display: block;
            border-radius: 8px;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            padding: 0 15px;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .stats {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            margin-bottom: 40px;
        }

        .stats h2 {
            color: #7c3aed;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #7c3aed;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #64748b;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: white;
            border: 2px solid #e2e8f0;
            color: #7c3aed;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            border-color: #7c3aed;
            background: #f0fdf4;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← Back to Home</a>

        <header>
            <h1>🎨 Ashle Gardens Visual Gallery</h1>
            <p class="subtitle">Professional renderings of the Cambodian Temple Heritage Attraction & integrated campus</p>
        </header>

        <div class="stats">
            <h2>Project at a Glance</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value">9</div>
                    <div class="stat-label">Components</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">2-3</div>
                    <div class="stat-label">Acres</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">₹25–40L</div>
                    <div class="stat-label">Investment</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">₹8–12L</div>
                    <div class="stat-label">Monthly Revenue</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">18–24mo</div>
                    <div class="stat-label">Payback</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">250–300</div>
                    <div class="stat-label">Visitors/Week</div>
                </div>
            </div>
        </div>

        <div class="gallery-grid" id="gallery">
            <!-- Gallery items will be populated here -->
        </div>
    </div>

    <!-- Modal for full-size viewing -->
    <div class="modal" id="imageModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <img id="modalImage" src="" alt="">
        </div>
    </div>

    <script>
        // Define component data
        const components = [
            {
                title: "Temple Ruins",
                desc: "Lara Croft aesthetic with ferro-cement structure, stone veneer, and dramatic lighting. 60 sqft iconic centerpiece.",
                tag: "Center",
                image: "01-image.png"
            },
            {
                title: "Café Pavilion",
                desc: "Colonial Southeast Asian retreat with teak pergola, dappled light, and forest ambiance. 150 sqft operational hub.",
                tag: "Left",
                image: "02-image.png"
            },
            {
                title: "Pond",
                desc: "Natural forest pool with turquoise water, aquatic plants, and meditation focal point. 0.5 acres, borewell-fed.",
                tag: "Right",
                image: "03-image.png"
            },
            {
                title: "Aquarium Enclosure",
                desc: "Modern glass pavilion with 5-6 display tanks showcasing local freshwater and tropical species. 200 sqft.",
                tag: "Educational",
                image: "04-image.png"
            },
            {
                title: "Forest Edges",
                desc: "Immersive native forest canopy (neem, tamarind, mango) with dappled light and bird sanctuary habitat.",
                tag: "Perimeter",
                image: "05-image.png"
            },
            {
                title: "Pathways & Circulation",
                desc: "Organic meander with stone pavers, mulch paths, and teak boardwalk. Three routes: temple circuit, pond loop, explorer.",
                tag: "Navigation",
                image: "06-image.png"
            },
            {
                title: "Seating Nodes",
                desc: "6-8 strategic meditation spots (pond overlook, temple framing, café courtyard, forest meditation, aquarium, sunset).",
                tag: "Rest Points",
                image: "07-image.png"
            },
            {
                title: "Entry Pavilion & Arrival",
                desc: "Threshold moment with welcome archway, ticket pavilion, brief zone, and ascending path. Sacred space transition.",
                tag: "Experience",
                image: "08-image.png"
            },
            {
                title: "Overall Atmosphere",
                desc: "Sensory design across 5 senses: sight (light play), sound (birds, water), smell (earth, jasmine), touch (textures), vibe (restorative).",
                tag: "Immersive",
                image: "09-image.png"
            }
        ];

        // Populate gallery
        const gallery = document.getElementById('gallery');
        components.forEach(comp => {
            const item = document.createElement('div');
            item.className = 'gallery-item';
            item.innerHTML = `
                <img src="images/${comp.image}" alt="${comp.title}" onclick="openModal('images/${comp.image}', '${comp.title}')">
                <div class="gallery-item-info">
                    <div class="gallery-item-title">${comp.title}</div>
                    <div class="gallery-item-desc">${comp.desc}</div>
                    <span class="gallery-item-tag">${comp.tag}</span>
                    <button class="view-full-btn" onclick="openModal('images/${comp.image}', '${comp.title}')">View Full Size</button>
                </div>
            `;
            gallery.appendChild(item);
        });

        // Modal functions
        function openModal(src, title) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = src;
            modalImg.alt = title;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside image
        document.getElementById('imageModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>
</body>
</html>
